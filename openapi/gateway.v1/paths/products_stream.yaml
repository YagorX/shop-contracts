get:
  tags: [Catalog]
  summary: Stream products
  description: Streams product payloads using Server-Sent Events.
  operationId: streamProducts
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../gateway.v1.yaml#/components/parameters/XAppIdHeader'
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    - in: query
      name: offset
      required: false
      schema:
        type: integer
        minimum: 0
  responses:
    '200':
      description: SSE stream of products followed by an end event.
      content:
        text/event-stream:
          schema:
            type: string
            example: |
              event: product
              data: {"ID":"prod-001","SKU":"SKU-001","Name":"Coffee Mug"}

              event: end
              data: {"status":"completed"}
    '400':
      description: Bad request or invalid X-App-Id header
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '401':
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '500':
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
