openapi: 3.0.3
info:
  title: Shop Gateway API
  version: 1.0.0
  description: Public gateway contract for mini-shop (v1).
servers:
  - url: http://localhost:8080

tags:
  - name: System
  - name: Catalog
  - name: Cart
  - name: Checkout

paths:
  /health:
    get:
      summary: Liveness probe
      operationId: health
      tags: [System]
      responses:
        '200':
          description: Service is alive

  /ready:
    get:
      summary: Readiness probe
      operationId: ready
      tags: [System]
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products:
    get:
      summary: List products
      operationId: listProducts
      tags: [Catalog]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cart/items:
    post:
      summary: Add item to cart
      operationId: addCartItem
      tags: [Cart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cart:
    get:
      summary: Get current cart
      operationId: getCart
      tags: [Cart]
      parameters:
        - in: query
          name: customer_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /checkout:
    post:
      summary: Checkout cart
      operationId: checkout
      tags: [Checkout]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '202':
          description: Checkout accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Checkout conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Product:
      type: object
      required: [id, name, price, currency]
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        stock:
          type: integer
          minimum: 0

    CartItem:
      type: object
      required: [product_id, qty, price]
      properties:
        product_id:
          type: string
          format: uuid
        qty:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0

    Cart:
      type: object
      required: [customer_id, items, total_amount, currency]
      properties:
        customer_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total_amount:
          type: number
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3

    AddCartItemRequest:
      type: object
      required: [customer_id, product_id, qty]
      properties:
        customer_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        qty:
          type: integer
          minimum: 1

    CheckoutRequest:
      type: object
      required: [customer_id]
      properties:
        customer_id:
          type: string
          format: uuid

    CheckoutResponse:
      type: object
      required: [order_id, status]
      properties:
        order_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted]

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        trace_id:
          type: string
